defaultProxyProvider: default

lists:
  services:
    filename: /config/services.yaml
    defaultProxyProvider: default

tailscale:
  providers:
    default:
      tags: "tag:tsdproxy"
      services: true
      hostname: "tsdproxy"
      autoApproveDevices: true
      autoProvisionAcl: false
      preventDuplicates: true
  dataDir: /data/

http:
  hostname: 0.0.0.0
  port: 8080

log:
  level: info
  json: false
proxyAccessLog: true
