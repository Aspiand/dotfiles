name: dotfiles

services:
  database:
    container_name: sql
    image: docker.io/percona:latest
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - database:/var/lib/mysql
      - /etc/localtime:/etc/localtime
    ports:
      - 3306:3306

  phpmyadmin:
    container_name: phpmyadmin
    image: docker.io/phpmyadmin/phpmyadmin:latest
    restart: unless-stopped
    environment:
      PMA_HOST: database
      PMA_USER: root
      # PMA_PASSWORD: bukankahinimy?
      PMA_PASSWORD: root
    depends_on:
      - database
    ports:
      - 8008:80

  iml:
    container_name: iml
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}-openvino
    restart: unless-stopped
    ports:
      - 3003:3003
    volumes:
      - /etc/localtime:/etc/localtime
      - /dev/bus/usb:/dev/bus/usb
      - immich-model-cache:/cache
    devices:
      - /dev/dri:/dev/dri
    device_cgroup_rules:
      - "c 189:* rmw"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3003/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  9router:
    container_name: 9router
    image: decolua/9router:latest
    restart: unless-stopped
    ports:
      - 127.0.0.1:20128:20128
    volumes:
      - "$HOME/.9router:/app/data"
    environment:
      DATA_DIR: /app/data

  freebuff2api:
    container_name: freebuff2api
    image: ghcr.io/quorinex/freebuff2api:latest
    restart: unless-stopped
    ports:
      - 127.0.0.1:8080:8080
    environment:
      AUTH_TOKENS: ${FREEBUFF_AUTH_TOKENS}
      ROTATION_INTERVAL: ${FREEBUFF_ROTATION_INTERVAL:-6h}
      REQUEST_TIMEOUT: ${FREEBUFF_REQUEST_TIMEOUT:-15m}
      API_KEYS: ${FREEBUFF_API_KEYS}
      HTTP_PROXY: ${FREEBUFF_HTTP_PROXY}

volumes:
  database:
  immich-model-cache:
