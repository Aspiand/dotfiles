openapi: 3.0.0
info:
  title: PintarMenabung API (LKS 2026 Server Side Module)
  version: 1.0.0
  description: REST API untuk Aplikasi Manajemen Keuangan PintarMenabung.

servers:
  - url: http://localhost:8000
    description: Local Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

security:
  - bearerAuth: []

paths:
  /api/auth/register:
    post:
      summary: Register User
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [full_name, email, password]
              properties:
                full_name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              example:
                status: "success"
                message: "Registration successful"
                data:
                  name: "Dedi"
                  email: "dedi@webtech.id"
                  updated_at: "2025-07-11T16:01:46.000000Z"
                  created_at: "2025-07-11T16:01:46.000000Z"
                  id: 6
                  token: "1|wwuOrgoVe4Xyj5dvUmnf6WTPTaA..."
        '422':
          description: Invalid field
          content:
            application/json:
              example:
                status: "error"
                message: "Invalid field"
                errors:
                  name: 
                    - "The name field is required."
                  email: 
                    - "The email has already been taken."
                  password: 
                    - "The password field must be at least 6 characters."

  /api/auth/login:
    post:
      summary: Login User
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              example:
                status: "success"
                message: "Login successful"
                data:
                  id: 1
                  name: "Budi"
                  email: "budi@webtech.id"
                  created_at: "2025-07-11T16:01:38.000000Z"
                  updated_at: "2025-07-11T16:01:38.000000Z"
                  token: "2|0Q2TAdua0FOslp1F4cxfkrzQgkp..."
        '401':
          description: Username or password incorrect
          content:
            application/json:
              example:
                status: "error"
                message: "Username or password incorrect"

  /api/auth/logout:
    post:
      summary: Logout User
      tags: [Authentication]
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              example:
                status: "success"
                message: "Logout successful"
        '401':
          description: Unauthenticated
          content:
            application/json:
              example:
                status: "error"
                message: "Unauthenticated."

  /api/currencies:
    get:
      summary: Get All Currencies
      tags: [Currency & Category]
      responses:
        '200':
          description: Get all currencies successful
          content:
            application/json:
              example:
                message: "Get all currencies successful"
                data:
                  currencies:
                    - id: 1
                      name: "US Dollar"
                      symbol: "$"
                      code: "USD"
                      created_at: "2025-07-11T16:01:37..."
                      updated_at: "2025-07-11T16:01:37..."
        '401':
          description: Unauthenticated
          content:
            application/json:
              example:
                status: "error"
                message: "Unauthenticated."

  /api/categories:
    get:
      summary: Get All Categories
      tags: [Currency & Category]
      responses:
        '200':
          description: Get all categories successful
          content:
            application/json:
              example:
                status: "success"
                message: "Get all categories successful"
                data:
                  categories:
                    - id: 1
                      name: "Outgoing Transfer"
                      icon: "⬆"
                      type: "EXPENSE"
                      created_at: "2025-07-11T16:01:38..."
                      updated_at: "2025-07-11T16:01:38..."
        '401':
          description: Unauthenticated
          content:
            application/json:
              example:
                status: "error"
                message: "Unauthenticated."

  /api/wallets:
    get:
      summary: Get All Wallets
      tags: [Wallet]
      responses:
        '200':
          description: Get all wallets successful
          content:
            application/json:
              example:
                status: "success"
                message: "Get all wallets successful"
                data:
                  wallets:
                    - id: 2
                      user_id: 1
                      name: "Bank"
                      created_at: "2025-07-11T16:01:38..."
                      updated_at: "2025-07-11T16:01:38..."
                      deleted_at: null
                      currency_code: "IDR"
                      balance: 12250000
        '401':
          description: Unauthenticated
          content:
            application/json:
              example:
                status: "error"
                message: "Unauthenticated."
    post:
      summary: Add Wallet
      tags: [Wallet]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, currency_code]
              properties:
                name:
                  type: string
                currency_code:
                  type: string
      responses:
        '201':
          description: Wallet added successful
          content:
            application/json:
              example:
                status: "success"
                message: "Wallet added successful"
                data:
                  name: "Savings"
                  user_id: 1
                  updated_at: "2025-07-11T16:22:44.000000Z"
                  created_at: "2025-07-11T16:22:44.000000Z"
                  id: 26
                  currency_code: "IDR"
        '422':
          description: Invalid field
          content:
            application/json:
              example:
                status: "error"
                message: "Invalid field"
                errors:
                  name:
                    - "The name field is required."
                  currency_code:
                    - "The selected currency code is invalid."
        '401':
          description: Unauthenticated
          content:
            application/json:
              example:
                status: "error"
                message: "Unauthenticated."

  /api/wallets/{walletId}:
    parameters:
      - name: walletId
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: Get Detail Wallet
      tags: [Wallet]
      responses:
        '200':
          description: Get detail wallet successful
          content:
            application/json:
              example:
                status: "success"
                message: "Get detail wallet successful"
                data:
                  id: 1
                  user_id: 1
                  name: "Cash IDR"
                  created_at: "2025-07-11T16:01:38.000000Z"
                  updated_at: "2025-07-11T16:26:25.000000Z"
                  deleted_at: null
                  currency_code: "IDR"
                  balance: 4865000
        '403':
          description: Forbidden access
          content:
            application/json:
              example:
                status: "error"
                message: "Forbidden access"
        '404':
          description: Not found
          content:
            application/json:
              example:
                status: "error"
                message: "Not found"
        '401':
          description: Unauthenticated
          content:
            application/json:
              example:
                status: "error"
                message: "Unauthenticated."
    put:
      summary: Update Wallet
      tags: [Wallet]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Wallet updated successful
          content:
            application/json:
              example:
                status: "success"
                message: "Wallet updated successful"
                data:
                  id: 1
                  user_id: 1
                  name: "Cash IDR"
                  created_at: "2025-07-11T16:01:38.000000Z"
                  updated_at: "2025-07-11T16:26:25.000000Z"
                  deleted_at: null
                  currency_code: "IDR"
        '403':
          description: Forbidden access
          content:
            application/json:
              example:
                status: "error"
                message: "Forbidden access"
        '404':
          description: Not found
          content:
            application/json:
              example:
                status: "error"
                message: "Not found"
        '401':
          description: Unauthenticated
          content:
            application/json:
              example:
                status: "error"
                message: "Unauthenticated."
    delete:
      summary: Delete Wallet
      tags: [Wallet]
      responses:
        '200':
          description: Wallet deleted successful
          content:
            application/json:
              example:
                status: "success"
                message: "Wallet deleted successful"
        '403':
          description: Forbidden access
          content:
            application/json:
              example:
                status: "error"
                message: "Forbidden access"
        '404':
          description: Not found
          content:
            application/json:
              example:
                status: "error"
                message: "Not found"
        '401':
          description: Unauthenticated
          content:
            application/json:
              example:
                status: "error"
                message: "Unauthenticated."

  /api/transactions:
    get:
      summary: Get Transactions
      tags: [Transaction]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 25
        - name: month
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: year
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Get transactions successful
          content:
            application/json:
              example:
                current_page: 1
                data:
                  - id: 842
                    category_id: 3
                    wallet_id: 1
                    amount: 50000
                    note: "starbucks"
                    date: "2025-07-31"
                    created_at: "2025-07-11T16:44:09.000000Z"
                    updated_at: "2025-07-11T16:44:09.000000Z"
                    wallet:
                      id: 1
                      user_id: 1
                      name: "Savings IDR"
                      created_at: "2025-07-11T16:01:38.000000Z"
                      updated_at: "2025-07-11T16:26:25.000000Z"
                      deleted_at: null
                      currency_code: "IDR"
                    category:
                      id: 3
                      name: "Food & Drinks"
                      icon: "🍔"
                      type: "EXPENSE"
                      created_at: "2025-07-11T16:01:38.000000Z"
                      updated_at: "2025-07-11T16:01:38.000000Z"
                from: 1
                last_page: 170
                per_page: 1
                to: 1
                total: 170
        '401':
          description: Unauthenticated
          content:
            application/json:
              example:
                status: "error"
                message: "Unauthenticated."
    post:
      summary: Add Transaction
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wallet_id, category_id, amount, date]
              properties:
                wallet_id:
                  type: integer
                category_id:
                  type: integer
                amount:
                  type: integer
                  minimum: 1
                date:
                  type: string
                  format: date
                note:
                  type: string
      responses:
        '201':
          description: Transaction added successful
          content:
            application/json:
              example:
                status: "success"
                message: "Transaction added successful"
                data:
                  category_id: 3
                  wallet_id: 1
                  amount: 50000
                  note: "starbucks"
                  date: "2025-07-31"
                  updated_at: "2025-07-11T16:44:09.000000Z"
                  created_at: "2025-07-11T16:44:09.000000Z"
                  id: 842
        '422':
          description: Invalid field
          content:
            application/json:
              example:
                status: "error"
                message: "Invalid field"
                errors:
                  name:
                    - "The name field is required."
                  currency_code:
                    - "The selected currency code is invalid."
        '401':
          description: Unauthenticated
          content:
            application/json:
              example:
                status: "error"
                message: "Unauthenticated."

  /api/transactions/{transactionId}:
    delete:
      summary: Delete Transaction
      tags: [Transaction]
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Transaction deleted successful
          content:
            application/json:
              example:
                status: "success"
                message: "Transaction deleted successful"
        '403':
          description: Forbidden access
          content:
            application/json:
              example:
                status: "error"
                message: "Forbidden access"
        '404':
          description: Not found
          content:
            application/json:
              example:
                status: "error"
                message: "Not found"
        '401':
          description: Unauthenticated
          content:
            application/json:
              example:
                status: "error"
                message: "Unauthenticated."

  /api/reports/summary-by-category/expense:
    get:
      summary: Get Summary by Expense Category
      tags: [Financial Report]
      parameters:
        - name: month
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: year
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Get summary by expense category successful
          content:
            application/json:
              example:
                status: "success"
                message: "Get summary by expense category successful"
                data:
                  summary:
                    - category:
                        id: 13
                        name: "Groceries"
                        icon: "🛒"
                        color: "#55EFC4"
                        type: "EXPENSE"
                        created_at: "2025-07-28T02:37:46.000000Z"
                        updated_at: "2025-07-28T02:37:46.000000Z"
                      amount: 50000
        '401':
          description: Unauthenticated
          content:
            application/json:
              example:
                status: "error"
                message: "Unauthenticated."

  /api/reports/summary-by-category/income:
    get:
      summary: Get Summary by Income Category
      tags: [Financial Report]
      parameters:
        - name: month
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: year
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Get summary by income category successful
          content:
            application/json:
              example:
                status: "success"
                message: "Get summary by income category successful"
                data:
                  summary:
                    - category:
                        id: 2
                        name: "Incoming Transfer"
                        icon: "⬇"
                        color: "#00B894"
                        type: "INCOME"
                        created_at: "2025-07-28T02:37:46.000000Z"
                        updated_at: "2025-07-28T02:37:46.000000Z"
                      amount: 1050000
        '401':
          description: Unauthenticated
          content:
            application/json:
              example:
                status: "error"
                message: "Unauthenticated."
