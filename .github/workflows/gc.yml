name: GC R2 Cache

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "List what would be deleted, skip actual deletion"
        type: boolean
        default: false

env:
  CUTOFF_DAYS: 30
  KEEP_VERSIONS: 2
  EXCLUDED_PACKAGES: '["9router"]'

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Collect R2 objects & narinfo metadata
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3api list-objects \
            --bucket "${{ secrets.R2_BUCKET }}" \
            --endpoint "${{ secrets.R2_ENDPOINT }}" \
            --region auto \
            --output json \
          > /tmp/objects.json

          ALL_KEYS=$(jq -r '.Contents // [] | .[].Key' /tmp/objects.json)
          echo "$ALL_KEYS" > /tmp/all-keys.txt

          jq -r '.Contents // [] | .[] | select(.Key | endswith(".narinfo")) | [.Key, .LastModified] | @tsv' \
            /tmp/objects.json > /tmp/narinfo-list.tsv

      - name: Download & parse narinfos
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          > /tmp/narinfo-data.txt

          mkdir -p /tmp/narinfos
          aws s3 cp "s3://${{ secrets.R2_BUCKET }}/" /tmp/narinfos/ \
            --endpoint "${{ secrets.R2_ENDPOINT }}" \
            --region auto \
            --recursive \
            --exclude "*" \
            --include "*.narinfo" \
            --only-show-errors

          cd /tmp/narinfos
          for NARINFO in *.narinfo; do
            [ -f "$NARINFO" ] || continue
            KEY="$NARINFO"
            STORE_PATH=$(grep '^StorePath:' "$NARINFO" 2>/dev/null | sed 's/^StorePath: //')
            LASTMOD=$(jq -r --arg key "$KEY" '[.Contents // [] | .[] | select(.Key == $key) | .LastModified] | if length > 0 then .[0] else "" end' /tmp/objects.json)

            if [ -n "$STORE_PATH" ]; then
              echo "$KEY|$LASTMOD|$STORE_PATH" >> /tmp/narinfo-data.txt
            fi
          done

          echo "Narinfos parsed: $(wc -l < /tmp/narinfo-data.txt)"

      - name: Build delete list
        run: |
          > /tmp/to-delete.txt
          CUTOFF=$(date -u -d "-$CUTOFF_DAYS days" +%s)
          PACKAGES=$(nix eval .#packages.x86_64-linux --json --impure 2>/dev/null | jq -r 'keys[]' || echo "")

          # ── Phase A: Orphan NAR files ──
          echo "=== Phase A: Orphan NAR files ==="
          while IFS= read -r KEY; do
            if echo "$KEY" | grep -q '^nar/'; then
              NAR_HASH=$(basename "$KEY")
              if ! grep -q "$NAR_HASH" /tmp/narinfo-data.txt 2>/dev/null; then
                echo "$KEY" >> /tmp/to-delete.txt
                echo "  Orphan NAR: $KEY"
              fi
            fi
          done < /tmp/all-keys.txt

          # ── Phase B: Stale packages (not in flake) ──
          echo "=== Phase B: Stale packages (not in flake) ==="
          while IFS='|' read -r KEY LASTMOD STORE_PATH; do
            MATCHED=false
            for PKG in $PACKAGES; do
              if echo "$STORE_PATH" | grep -qiF "$PKG"; then
                MATCHED=true
                break
              fi
            done
            if [ "$MATCHED" = false ]; then
              HASH="${KEY%.narinfo}"
              echo "${HASH}.narinfo" >> /tmp/to-delete.txt
              grep "^nar/.*${HASH}" /tmp/all-keys.txt >> /tmp/to-delete.txt 2>/dev/null || true
              echo "  Stale: $KEY → $STORE_PATH"
            fi
          done < /tmp/narinfo-data.txt

          # ── Phase C: Age-based — objects older than CUTOFF_DAYS ──
          echo "=== Phase C: Age-based (> ${CUTOFF_DAYS} days) ==="
          while IFS='|' read -r KEY LASTMOD STORE_PATH; do
            OBJ_TS=$(date -u -d "$LASTMOD" +%s 2>/dev/null || echo "0")
            if [ "$OBJ_TS" -lt "$CUTOFF" ] 2>/dev/null; then
              HASH="${KEY%.narinfo}"
              echo "${HASH}.narinfo" >> /tmp/to-delete.txt
              grep "^nar/.*${HASH}" /tmp/all-keys.txt >> /tmp/to-delete.txt 2>/dev/null || true
              echo "  Old: $KEY ($LASTMOD)"
            fi
          done < /tmp/narinfo-data.txt

          # ── Phase D: Keep latest N per package ──
          echo "=== Phase D: Keep latest $KEEP_VERSIONS per package ==="
          for PKG in $PACKAGES; do
            if echo "$EXCLUDED_PACKAGES" | jq -e --arg p "$PKG" 'index($p) != null' > /dev/null 2>&1; then
              continue
            fi

            grep -iF "$PKG" /tmp/narinfo-data.txt \
              | sort -t'|' -k2 \
              > /tmp/pkg-entries.txt

            TOTAL=$(wc -l < /tmp/pkg-entries.txt)

            if [ "$TOTAL" -le "$KEEP_VERSIONS" ]; then
              echo "  $PKG: $TOTAL versions, ≤ $KEEP_VERSIONS — keeping all"
              continue
            fi

            HEAD_COUNT=$((TOTAL - KEEP_VERSIONS))
            head -n "$HEAD_COUNT" /tmp/pkg-entries.txt | while IFS='|' read -r KEY LASTMOD STORE_PATH; do
              HASH="${KEY%.narinfo}"
              echo "${HASH}.narinfo" >> /tmp/to-delete.txt
              grep "^nar/.*${HASH}" /tmp/all-keys.txt >> /tmp/to-delete.txt 2>/dev/null || true
              echo "  Old version of $PKG: $STORE_PATH ($LASTMOD)"
            done
          done

          sort -u /tmp/to-delete.txt > /tmp/to-delete-dedup.txt
          mv /tmp/to-delete-dedup.txt /tmp/to-delete.txt

          echo ""
          echo "Total objects to delete: $(wc -l < /tmp/to-delete.txt)"

      - name: Execute deletions
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          DRY_RUN: ${{ inputs.dry-run || false }}
        run: |
          TOTAL=$(wc -l < /tmp/to-delete.txt)

          if [ "$DRY_RUN" = "true" ]; then
            echo "### Dry run — nothing deleted" >> "$GITHUB_STEP_SUMMARY"
            echo "Would delete $TOTAL objects:"
            cat /tmp/to-delete.txt
          else
            echo "Deleting $TOTAL objects..."
            xargs -P 10 -I{} aws s3api delete-object \
              --bucket "${{ secrets.R2_BUCKET }}" \
              --endpoint "${{ secrets.R2_ENDPOINT }}" \
              --region auto \
              --key "{}" \
            < /tmp/to-delete.txt
          fi

      - name: Report
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          REMAINING=$(aws s3api list-objects \
            --bucket "${{ secrets.R2_BUCKET }}" \
            --endpoint "${{ secrets.R2_ENDPOINT }}" \
            --region auto \
            --query "length(Contents[])" \
            --output text 2>/dev/null || echo "0")

          {
            echo "### GC R2 Cache"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Objects to delete | $(wc -l < /tmp/to-delete.txt) |"
            echo "| Objects remaining | $REMAINING |"
            echo "| Dry run | ${{ inputs.dry-run || false }} |"
          } >> "$GITHUB_STEP_SUMMARY"
