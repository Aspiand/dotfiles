name: GC R2 Cache

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "List what would be deleted, skip actual deletion"
        type: boolean
        default: false
      package:
        description: "Delete ALL versions of a specific package (e.g., test-pkg)"
        type: string
        required: false
        default: ""

env:
  CUTOFF_DAYS: 30
  KEEP_VERSIONS: 2

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Clear installer summary
        run: |
          > "$GITHUB_STEP_SUMMARY"

      - name: Read excluded packages
        id: excluded
        run: |
          EXCLUDED=$(cat .github/excluded-packages.json 2>/dev/null || echo '[]')
          echo "excluded=$EXCLUDED" >> "$GITHUB_OUTPUT"

      - name: Collect R2 objects & narinfo metadata
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3api list-objects \
            --bucket "${{ secrets.R2_BUCKET }}" \
            --endpoint "${{ secrets.R2_ENDPOINT }}" \
            --region auto \
            --output json \
          > /tmp/objects.json

          ALL_KEYS=$(jq -r '.Contents // [] | .[].Key' /tmp/objects.json)
          echo "$ALL_KEYS" > /tmp/all-keys.txt

          jq -r '.Contents // [] | .[] | select(.Key | endswith(".narinfo")) | [.Key, .LastModified] | @tsv' \
            /tmp/objects.json > /tmp/narinfo-list.tsv

      - name: Download & parse narinfos
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          > /tmp/narinfo-data.txt

          mkdir -p /tmp/narinfos
          aws s3 cp "s3://${{ secrets.R2_BUCKET }}/" /tmp/narinfos/ \
            --endpoint "${{ secrets.R2_ENDPOINT }}" \
            --region auto \
            --recursive \
            --exclude "*" \
            --include "*.narinfo" \
            --only-show-errors

          cd /tmp/narinfos
          for NARINFO in *.narinfo; do
            [ -f "$NARINFO" ] || continue
            KEY="$NARINFO"
            STORE_PATH=$(grep '^StorePath:' "$NARINFO" 2>/dev/null | sed 's/^StorePath: //')
            LASTMOD=$(jq -r --arg key "$KEY" '[.Contents // [] | .[] | select(.Key == $key) | .LastModified] | if length > 0 then .[0] else "" end' /tmp/objects.json)

            if [ -n "$STORE_PATH" ]; then
              echo "$KEY|$LASTMOD|$STORE_PATH" >> /tmp/narinfo-data.txt
            fi
          done

          echo "Narinfos parsed: $(wc -l < /tmp/narinfo-data.txt)"

      # ──────────────────────────────────────────────────────
      # SPECIFIC PACKAGE REMOVAL MODE
      # If inputs.package is set, skip 4-phase GC entirely.
      # Delete ALL versions of that package, then exit.
      # ──────────────────────────────────────────────────────
      - name: Filter specific package (if input provided)
        if: inputs.package != ''
        env:
          TARGET_PKG: ${{ inputs.package }}
        run: |
          echo "=== Specific package mode: $TARGET_PKG ==="
          > /tmp/to-delete.txt

          while IFS='|' read -r KEY LASTMOD STORE_PATH; do
            if echo "$STORE_PATH" | grep -qiF "$TARGET_PKG"; then
              HASH="${KEY%.narinfo}"
              echo "${HASH}.narinfo" >> /tmp/to-delete.txt
              grep "^nar/.*${HASH}" /tmp/all-keys.txt >> /tmp/to-delete.txt 2>/dev/null || true
              echo "  Marked for delete: $KEY → $STORE_PATH"
            fi
          done < /tmp/narinfo-data.txt

          sort -u /tmp/to-delete.txt > /tmp/to-delete-dedup.txt
          mv /tmp/to-delete-dedup.txt /tmp/to-delete.txt

          TOTAL=$(wc -l < /tmp/to-delete.txt)
          echo "Total objects to delete for $TARGET_PKG: $TOTAL"
          echo "SPECIFIC_PKG_DELETE=true" >> "$GITHUB_ENV"

      # ──────────────────────────────────────────────────────
      # BUILD DELETE LIST (4-phase GC, skipped in specific-pkg mode)
      # Phase order: A → B → D → C
      #   A: Orphan NAR files (no matching narinfo)
      #   B: Stale packages (not in flake anymore)
      #   D: Keep latest N versions per package
      #   C: Age-based cleanup (only what's left after D)
      # ──────────────────────────────────────────────────────
      - name: Build delete list (full GC)
        if: inputs.package == ''
        env:
          EXCLUDED: ${{ steps.excluded.outputs.excluded }}
        run: |
          > /tmp/to-delete.txt
          CUTOFF=$(date -u -d "-$CUTOFF_DAYS days" +%s)
          PACKAGES=$(nix eval .#packages.x86_64-linux --json --impure 2>/dev/null | jq -r 'keys[]' || echo "")

          # ── Phase A: Orphan NAR files ──
          echo "=== Phase A: Orphan NAR files ==="
          while IFS= read -r KEY; do
            if echo "$KEY" | grep -q '^nar/'; then
              NAR_HASH=$(basename "$KEY")
              if ! grep -q "$NAR_HASH" /tmp/narinfo-data.txt 2>/dev/null; then
                echo "$KEY" >> /tmp/to-delete.txt
                echo "  Orphan NAR: $KEY"
              fi
            fi
          done < /tmp/all-keys.txt

          # ── Phase B: Stale packages (not in flake) ──
          echo "=== Phase B: Stale packages (not in flake) ==="
          while IFS='|' read -r KEY LASTMOD STORE_PATH; do
            MATCHED=false
            for PKG in $PACKAGES; do
              # Match on package name in store path (e.g. "codegraph" in "codegraph-0.1.0")
              if echo "$STORE_PATH" | grep -qiE "/${PKG}-[0-9]"; then
                MATCHED=true
                break
              fi
            done
            if [ "$MATCHED" = false ]; then
              HASH="${KEY%.narinfo}"
              echo "${HASH}.narinfo" >> /tmp/to-delete.txt
              grep "^nar/.*${HASH}" /tmp/all-keys.txt >> /tmp/to-delete.txt 2>/dev/null || true
              echo "  Stale: $KEY → $STORE_PATH"
            fi
          done < /tmp/narinfo-data.txt

          # ── Phase D: Keep latest N per package (run BEFORE age-based) ──
          echo "=== Phase D: Keep latest $KEEP_VERSIONS per package ==="
          for PKG in $PACKAGES; do
            if echo "$EXCLUDED" | jq -e --arg p "$PKG" 'index($p) != null' > /dev/null 2>&1; then
              continue
            fi

            grep -iF "/${PKG}-" /tmp/narinfo-data.txt \
              | sort -t'|' -k2 \
              > /tmp/pkg-entries.txt

            TOTAL=$(wc -l < /tmp/pkg-entries.txt)

            if [ "$TOTAL" -le "$KEEP_VERSIONS" ]; then
              echo "  $PKG: $TOTAL versions, ≤ $KEEP_VERSIONS — keeping all"
              continue
            fi

            HEAD_COUNT=$((TOTAL - KEEP_VERSIONS))
            head -n "$HEAD_COUNT" /tmp/pkg-entries.txt | while IFS='|' read -r KEY LASTMOD STORE_PATH; do
              HASH="${KEY%.narinfo}"
              echo "${HASH}.narinfo" >> /tmp/to-delete.txt
              grep "^nar/.*${HASH}" /tmp/all-keys.txt >> /tmp/to-delete.txt 2>/dev/null || true
              echo "  Old version of $PKG: $STORE_PATH ($LASTMOD)"
            done
          done

          # ── Phase C: Age-based (only what's left after D) ──
          echo "=== Phase C: Age-based (> ${CUTOFF_DAYS} days) ==="
          while IFS='|' read -r KEY LASTMOD STORE_PATH; do
            OBJ_TS=$(date -u -d "$LASTMOD" +%s 2>/dev/null || echo "0")
            if [ "$OBJ_TS" -lt "$CUTOFF" ] 2>/dev/null; then
              HASH="${KEY%.narinfo}"
              echo "${HASH}.narinfo" >> /tmp/to-delete.txt
              grep "^nar/.*${HASH}" /tmp/all-keys.txt >> /tmp/to-delete.txt 2>/dev/null || true
              echo "  Old: $KEY ($LASTMOD) → $STORE_PATH"
            fi
          done < /tmp/narinfo-data.txt

          # ── Deduplicate ──
          sort -u /tmp/to-delete.txt > /tmp/to-delete-dedup.txt
          mv /tmp/to-delete-dedup.txt /tmp/to-delete.txt

          # Calculate total reclaimable size
          jq -Rn '[inputs | select(length > 0)]' /tmp/to-delete.txt > /tmp/delete-keys.json
          RECLAIMABLE_SIZE=$(jq -r '
            [.Contents // [] | .[] | select(
              .Key as $k | ($delete_keys[0] | index($k)) != null
            ) | .Size] | add // 0
          ' --slurpfile delete_keys /tmp/delete-keys.json /tmp/objects.json)
          echo "RECLAIMABLE_SIZE=$RECLAIMABLE_SIZE" >> "$GITHUB_ENV"
          echo "Reclaimable size: $(numfmt --to=iec "$RECLAIMABLE_SIZE" 2>/dev/null || echo "${RECLAIMABLE_SIZE}B")"

          echo ""
          echo "Total objects to delete: $(wc -l < /tmp/to-delete.txt)"

      - name: Execute deletions
        if: always() && hashFiles('/tmp/to-delete.txt') != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          DRY_RUN: ${{ inputs.dry-run || false }}
        run: |
          if [ ! -f /tmp/to-delete.txt ] || [ ! -s /tmp/to-delete.txt ]; then
            echo "Nothing to delete"
            exit 0
          fi

          TOTAL=$(wc -l < /tmp/to-delete.txt)

          if [ "$DRY_RUN" = "true" ]; then
            echo "### Dry run — nothing deleted" >> "$GITHUB_STEP_SUMMARY"
            echo "Would delete $TOTAL objects:"
            cat /tmp/to-delete.txt
          else
            echo "Deleting $TOTAL objects..."
            # Batch delete — 1000 objects per batch (S3 API limit)
            # Group narinfos + NARs together, delete in batches
            sort -u /tmp/to-delete.txt | split -l 1000 - /tmp/delete-batch-

            for BATCH in /tmp/delete-batch-*; do
              [ -f "$BATCH" ] || continue
              KEYS=$(jq -Rn '[inputs | select(length > 0) | {Key: .}]' < "$BATCH")
              OBJECTS=$(echo "$KEYS" | jq '{Objects: ., Quiet: true}')

              aws s3api delete-objects \
                --bucket "${{ secrets.R2_BUCKET }}" \
                --endpoint "${{ secrets.R2_ENDPOINT }}" \
                --region auto \
                --delete "$OBJECTS" \
                --output json > /tmp/delete-result.json 2>&1 || {
                echo "Batch delete failed, falling back to per-item..."
                xargs -P 10 -I{} aws s3api delete-object \
                  --bucket "${{ secrets.R2_BUCKET }}" \
                  --endpoint "${{ secrets.R2_ENDPOINT }}" \
                  --region auto \
                  --key "{}" \
                < "$BATCH"
              }

              DELETED=$(jq -r '.Deleted | length' /tmp/delete-result.json 2>/dev/null || echo "0")
              echo "  Batch: $(wc -l < "$BATCH") objects → $DELETED deleted"
            done

            rm -f /tmp/delete-batch-*
          fi

      - name: Report
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$SPECIFIC_PKG_DELETE" ]; then
            REMAINING=$(aws s3api list-objects \
              --bucket "${{ secrets.R2_BUCKET }}" \
              --endpoint "${{ secrets.R2_ENDPOINT }}" \
              --region auto \
              --query "length(Contents[])" \
              --output text 2>/dev/null || echo "0")

            {
              echo "### GC R2 Cache"
              echo ""
              echo "| Metric | Value |"
              echo "|---|---|"
              echo "| Objects to delete | $(wc -l < /tmp/to-delete.txt 2>/dev/null || echo 0) |"
              echo "| Storage reclaimed | $(numfmt --to=iec "${RECLAIMABLE_SIZE:-0}" 2>/dev/null || echo "${RECLAIMABLE_SIZE:-0}")B |"
              echo "| Objects remaining | $REMAINING |"
              echo "| Dry run | ${{ inputs.dry-run || false }} |"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### Package Removal: ${{ inputs.package }}"
              echo ""
              echo "All cached versions of \`${{ inputs.package }}\` removed."
              echo "Objects deleted: $(wc -l < /tmp/to-delete.txt 2>/dev/null || echo 0)"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
