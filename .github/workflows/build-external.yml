name: Build External Flake

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "GitHub repo (e.g. NousResearch/hermes-agent)"
        required: true
      ref:
        description: "Branch/tag/commit"
        required: false
        default: "main"
      package:
        description: "Package(s) — comma-separated, or 'ALL' for all"
        required: true
        default: "ALL"

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      repository: ${{ github.event.inputs.repo }}
      ref: ${{ github.event.inputs.ref }}
      package: ${{ github.event.inputs.package }}
    secrets: inherit
