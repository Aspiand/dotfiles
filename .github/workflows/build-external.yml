name: Build External Flake

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "GitHub repo (e.g. NousResearch/hermes-agent)"
        required: true
        default: "NousResearch/hermes-agent"
      ref:
        description: "Branch/tag/commit"
        required: false
        default: "main"
      package:
        description: "Package attribute(s) — comma-separated, or 'ALL' for all packages"
        required: true
        default: "ALL"

env:
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ github.event.inputs.repo }}
          ref: ${{ github.event.inputs.ref }}

      - uses: DeterminateSystems/nix-installer-action@v22

      - id: set-matrix
        env:
          INPUT_PACKAGE: ${{ github.event.inputs.package }}
        run: |
          if [ "$INPUT_PACKAGE" = "ALL" ]; then
            MATRIX=$(nix eval .#packages.x86_64-linux --json --impure | jq -c '
              keys | map({system: "x86_64-linux", package: .})
            ')
          else
            MATRIX=$(echo "$INPUT_PACKAGE" | jq -Rc '
              split(",") | map(gsub("^\\s+|\\s+$"; "")) | map({system: "x86_64-linux", package: .})
            ')
          fi
          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"

  build:
    needs: generate-matrix
    name: ${{ matrix.package }} (${{ matrix.system }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ github.event.inputs.repo }}
          ref: ${{ github.event.inputs.ref }}

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Build package
        env:
          NIXPKGS_ALLOW_UNFREE: 1
        run: nix build .#packages.${{ matrix.system }}.${{ matrix.package }} --print-build-logs --impure

      - name: Sign & copy to R2 cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          NIX_SECRET_KEY: ${{ secrets.NIX_SECRET_KEY }}
          SYSTEM: ${{ matrix.system }}
          PACKAGE: ${{ matrix.package }}
        run: |
          # Sign so consumers can verify integrity
          echo "$NIX_SECRET_KEY" > ./secret-key
          nix store sign --key-file ./secret-key $(readlink -f result)
          rm -f ./secret-key

          # Copy store path + all deps to R2 (acts as binary cache)
          nix copy --to "s3://${R2_BUCKET}?endpoint=${R2_ENDPOINT}&region=auto" $(readlink -f result)

          # Also copy the closure so dependent builds can fetch deps
          echo "Copied $PACKAGE ($SYSTEM) to R2 cache"
