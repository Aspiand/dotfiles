name: Auto-Update Nix Packages

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: "Force test — commit dummy change and run build+promote"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Clear installer summary
        run: |
          > "$GITHUB_STEP_SUMMARY"

      - name: Save current lock
        run: |
          cp flake.lock /tmp/old-flake.lock 2>/dev/null || true

      - name: Update packages with nix-update
        id: nix-update
        run: |
          nix profile install nixpkgs#nix-update

          UPDATED=""
          FAILED=""

          for nixfile in nix/packages/*.nix; do
            pkg=$(basename "$nixfile" .nix)
            if nix-update "$pkg" --no-commit; then
              UPDATED="$UPDATED $pkg"
            else
              FAILED="$FAILED $pkg"
            fi
          done

          echo "updated=$UPDATED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

      - name: Update flake lock
        run: nix flake update --no-commit

      - name: Build changelog
        id: changelog
        run: |
          UPDATED="${{ steps.nix-update.outputs.updated }}"
          FAILED="${{ steps.nix-update.outputs.failed }}"
          CHANGELOG=""

          if [ -n "$UPDATED" ]; then
            CHANGELOG="## Updated"$'\n'"Updated:$UPDATED"
          fi
          if [ -n "$FAILED" ]; then
            CHANGELOG="${CHANGELOG}"$'\n'"## Failed"$'\n'"Failed to update:$FAILED"
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No package updates"
          fi

          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "### Package updates" >> "$GITHUB_STEP_SUMMARY"
          echo "$CHANGELOG" >> "$GITHUB_STEP_SUMMARY"

      - name: Commit to staging branch
        id: commit
        env:
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          FORCE: ${{ inputs.force }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            if [[ "$FORCE" != "true" ]]; then
              exit 0
            fi
            git commit --allow-empty -m "chore: force-test auto-update pipeline"
            git push origin HEAD:refs/heads/auto-update/${{ github.run_id }}-${{ github.run_attempt }}
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          { echo "chore: auto-update nix packages"; echo ""; echo "$CHANGELOG"; } > /tmp/commit-msg
          git commit --file /tmp/commit-msg
          git push origin HEAD:refs/heads/auto-update/${{ github.run_id }}-${{ github.run_attempt }}
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

  build:
    needs: update
    if: needs.update.outputs.has_changes == 'true'
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      ref: auto-update/${{ github.run_id }}-${{ github.run_attempt }}

  promote:
    needs: [update, build]
    if: needs.update.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - run: |
          BRANCH="auto-update/${{ github.run_id }}-${{ github.run_attempt }}"
          git fetch origin "$BRANCH"
          git merge --ff-only FETCH_HEAD
          git push origin main
          git push origin --delete "$BRANCH"
