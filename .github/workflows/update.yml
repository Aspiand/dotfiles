name: Auto-Update Nix Packages

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      force:
        description: "Force test — commit dummy change and run build+promote"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Clear installer summary
        run: |
          > "$GITHUB_STEP_SUMMARY"

      - name: Save current sources
        run: |
          if [ -f nix/_sources/_generated.json ]; then
            cp nix/_sources/_generated.json /tmp/old-sources.json
          else
            echo '{}' > /tmp/old-sources.json
          fi

      - name: Generate sources
        run: nix run github:berberman/nvfetcher -- --build-dir nix/_sources

      - name: Rename generated files
        run: |
          mv nix/_sources/generated.nix nix/_sources/_generated.nix
          mv nix/_sources/generated.json nix/_sources/_generated.json

      - name: Build changelog
        id: changelog
        run: |
          CHANGELOG=$(jq -r --slurpfile old /tmp/old-sources.json '
            . as $new |
            $old[0] as $old |
            [
              ($new | keys) as $all |
              ($all | map(select($old[.] | not))) as $added |
              ($old | keys | map(select($new[.] | not))) as $removed |
              ($all | map(select(
                ($old[.] | .version) and ($new[.] | .version) and
                ($old[.] | .version) != ($new[.] | .version)
              ))) as $updated |
              (if ($added | length) > 0 then "## Added\n" + ($added | map("- \(.)") | join("\n")) else "" end),
              (if ($removed | length) > 0 then "## Removed\n" + ($removed | map("- \(.)") | join("\n")) else "" end),
              (if ($updated | length) > 0 then "## Updated\n" + ($updated | map("- \(.): \($old[.].version) → \($new[.].version)") | join("\n")) else "" end)
            ] | map(select(. != "")) | join("\n\n")
          ' nix/_sources/_generated.json)
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$CHANGELOG" ]; then
            echo "### Package updates" >> "$GITHUB_STEP_SUMMARY"
            echo "$CHANGELOG" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No package updates" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit to staging branch
        id: commit
        env:
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nix/_sources/_generated.nix nix/_sources/_generated.json
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            if [[ "${{ inputs.force }}" != "true" ]]; then
              exit 0
            fi
            git commit --allow-empty -m "chore: force-test auto-update pipeline"
            git push origin HEAD:refs/heads/auto-update/${{ github.run_id }}-${{ github.run_attempt }}
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$CHANGELOG" ]; then
            { echo "chore: auto-update nix packages"; echo ""; echo "$CHANGELOG"; } > /tmp/commit-msg
            git commit --file /tmp/commit-msg
          else
            git commit -m "chore: auto-update nix packages"
          fi
          git push origin HEAD:refs/heads/auto-update/${{ github.run_id }}-${{ github.run_attempt }}
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

  build:
    needs: update
    if: needs.update.outputs.has_changes == 'true'
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      ref: auto-update/${{ github.run_id }}-${{ github.run_attempt }}

  promote:
    needs: [update, build]
    if: needs.update.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - run: |
          BRANCH="auto-update/${{ github.run_id }}-${{ github.run_attempt }}"
          git fetch origin "$BRANCH"
          git merge --ff-only FETCH_HEAD
          git push origin main
          git push origin --delete "$BRANCH"
