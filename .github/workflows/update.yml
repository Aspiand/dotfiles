name: Auto-Update Nix Packages

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: DeterminateSystems/nix-installer-action@v16
        with:
          cache: true

      - name: Generate sources
        run: nix run github:berberman/nvfetcher -- --build-dir nix/_sources

      - name: Rename generated files
        run: |
          mv nix/_sources/generated.nix nix/_sources/_generated.nix
          mv nix/_sources/generated.json nix/_sources/_generated.json

      - name: Commit to staging branch
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nix/_sources/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: auto-update nix packages"
          git push origin HEAD:refs/heads/auto-update/${{ github.run_id }}
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

  build:
    needs: update
    if: needs.update.outputs.has_changes == 'true'
    uses: ./.github/workflows/build.yml
    with:
      ref: auto-update/${{ github.run_id }}

  promote:
    needs: [update, build]
    if: needs.update.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - run: |
          BRANCH="auto-update/${{ github.run_id }}"
          git fetch origin "$BRANCH"
          git merge --ff-only FETCH_HEAD
          git push origin main
          git push origin --delete "$BRANCH"
