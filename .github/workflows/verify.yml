name: Verify R2 Cache

env:
  PUBLIC_CACHE_URL: https://nix.aspian.my.id

on:
  workflow_dispatch:
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: List objects in R2
        id: list
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3api list-objects \
            --bucket "${{ secrets.R2_BUCKET }}" \
            --endpoint "${{ secrets.R2_ENDPOINT }}" \
            --region auto \
            --output json \
          > /tmp/objects.json

          jq -c '[.Contents // [] | .[] | select(.Key | endswith(".narinfo"))]' \
            /tmp/objects.json > /tmp/narinfos.json

          TOTAL=$(jq '[.Contents // [] | .[] | select(.Key | endswith(".narinfo"))] | length' /tmp/objects.json)
          TOTAL_NAR=$(jq '[.Contents // [] | .[] | select(.Key | contains("nar/"))] | length' /tmp/objects.json)
          TOTAL_SIZE=$(jq '[.Contents // [] | .[].Size] | add // 0' /tmp/objects.json)

          echo "total_narinfos=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "total_nar=$TOTAL_NAR" >> "$GITHUB_OUTPUT"
          echo "total_size=$TOTAL_SIZE" >> "$GITHUB_OUTPUT"

      - name: Download all narinfos
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p /tmp/narinfos
          aws s3 cp "s3://${{ secrets.R2_BUCKET }}/" /tmp/narinfos/ \
            --endpoint "${{ secrets.R2_ENDPOINT }}" \
            --region auto \
            --recursive \
            --exclude "*" \
            --include "*.narinfo" \
            --only-show-errors

      - name: Check each narinfo
        run: |
          ISSUES_LOG="/tmp/issues.txt"
          > "$ISSUES_LOG"
          CURL_QUEUE="/tmp/curl-queue.txt"
          > "$CURL_QUEUE"

          cd /tmp/narinfos
          for NARINFO in *.narinfo; do
            [ -f "$NARINFO" ] || continue
            KEY="$NARINFO"
            echo "--- $KEY ---"

            STORE_PATH=$(grep '^StorePath:' "$NARINFO" 2>/dev/null | sed 's/^StorePath: //')
            SIG=$(grep '^Sig:' "$NARINFO" 2>/dev/null | sed 's/^Sig: //')
            NAR_URL=$(grep '^URL:' "$NARINFO" 2>/dev/null | sed 's/^URL: //')

            echo "  StorePath: $STORE_PATH"
            echo "  Has signature: $([ -n "$SIG" ] && echo yes || echo no) ($(echo "$SIG" | cut -d: -f1))"

            # Check signature
            if [ -z "$SIG" ]; then
              echo "  ✗ MISSING SIGNATURE"
              echo "no_sig:$KEY" >> "$ISSUES_LOG"
            fi

            # Check referenced NAR file exists (from objects.json — no S3 call)
            if [ -n "$NAR_URL" ]; then
              NAR_EXISTS=$(jq -r --arg url "$NAR_URL" '[.Contents // [] | .[] | select(.Key == $url)] | length > 0' /tmp/objects.json 2>/dev/null || echo "false")
              if [ "$NAR_EXISTS" = "true" ]; then
                echo "  Nar exists: yes"
              else
                echo "  ✗ NAR MISSING: $NAR_URL"
                echo "nar_missing:$KEY ($NAR_URL)" >> "$ISSUES_LOG"
              fi
            fi

            echo "$KEY" >> "$CURL_QUEUE"
          done

          # Parallel public cache check
          echo "--- Checking public cache ---"
          export PUBLIC_CACHE_URL
          xargs -P 20 -I{} sh -c '
            c=$(curl -s -o /dev/null -w "%{http_code}" "$PUBLIC_CACHE_URL/{}" 2>/dev/null || echo "error")
            echo "$c {}"
          ' < "$CURL_QUEUE" 2>/dev/null | while read -r code key; do
            echo "  Public cache $key: HTTP $code"
            if [ "$code" != "200" ]; then
              echo "cache_unreachable:$key (HTTP $code)" >> "$ISSUES_LOG"
            fi
          done

      - name: Cross-reference with flake packages
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Clear installer summary
        run: |
          > "$GITHUB_STEP_SUMMARY"

      - name: Check known packages against cache
        run: |
          MISSING_PKG=0
          PACKAGES=$(nix eval .#packages.x86_64-linux --json --impure 2>/dev/null | jq -r 'keys[]' || echo "")

          > /tmp/pkg-issues.txt
          for pkg in $PACKAGES; do
            if [ "$pkg" = "9router" ]; then
              continue
            fi

            MATCH=$(jq -r --arg pkg "$pkg" '
              [.[].Key | select(endswith(".narinfo"))] |
              map(select(contains($pkg)))
            ' /tmp/narinfos.json)

            if [ "$(echo "$MATCH" | jq 'length')" -gt 0 ]; then
              echo "✓ $pkg — found in R2"
            else
              echo "✗ $pkg — NOT found in R2"
              echo "missing_pkg:$pkg" >> /tmp/pkg-issues.txt
              MISSING_PKG=$((MISSING_PKG + 1))
            fi
          done

          echo "MISSING_PACKAGES=$MISSING_PKG" >> "$GITHUB_ENV"

      - name: Report
        if: always()
        run: |
          TOTAL_ISSUES=0
          if [ -f /tmp/issues.txt ]; then
            TOTAL_ISSUES=$(wc -l < /tmp/issues.txt)
          fi
          PKG_ISSUES=$(wc -l < /tmp/pkg-issues.txt 2>/dev/null || echo "0")
          TOTAL_FAIL=$((TOTAL_ISSUES + PKG_ISSUES))

          TOTAL_BYTES=${{ steps.list.outputs.total_size }}
          TOTAL_HUMAN=$(numfmt --to=iec "$TOTAL_BYTES" 2>/dev/null || echo "${TOTAL_BYTES}B")

          {
            echo "## Verify R2 Cache"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Narinfo files | ${{ steps.list.outputs.total_narinfos }} |"
            echo "| NAR files | ${{ steps.list.outputs.total_nar }} |"
            echo "| Total size | $TOTAL_HUMAN |"
            echo "| Issues found | $TOTAL_FAIL |"
            echo "| Packages missing from cache | ${MISSING_PACKAGES:-0} |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$TOTAL_FAIL" -gt 0 ]; then
            {
              echo "### Issues"
              echo ""
              echo "**Narinfo integrity:**"
              echo "\`\`\`"
              cat /tmp/issues.txt 2>/dev/null || echo "(none)"
              echo "\`\`\`"
              echo ""
              echo "**Missing packages:**"
              echo "\`\`\`"
              cat /tmp/pkg-issues.txt 2>/dev/null || echo "(none)"
              echo "\`\`\`"
            } >> "$GITHUB_STEP_SUMMARY"

            echo "::warning::Verification found $TOTAL_FAIL issue(s)"
          fi

      - name: Fail on any issue
        if: always()
        run: |
          TOTAL_ISSUES=0
          if [ -f /tmp/issues.txt ]; then
            TOTAL_ISSUES=$(wc -l < /tmp/issues.txt)
          fi
          PKG_ISSUES=$(wc -l < /tmp/pkg-issues.txt 2>/dev/null || echo "0")
          TOTAL_FAIL=$((TOTAL_ISSUES + PKG_ISSUES))

          if [ "$TOTAL_FAIL" -gt 0 ]; then
            echo "::error::$TOTAL_FAIL issue(s) found during verification"
            cat /tmp/issues.txt 2>/dev/null
            cat /tmp/pkg-issues.txt 2>/dev/null
            exit 1
          fi
