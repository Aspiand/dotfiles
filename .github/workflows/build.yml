name: Build Nix Packages

on:
  push:
    branches:
      - main
    paths:
      - "nix/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/build.yml"
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout (defaults to current ref)"
        type: string
        required: false
        default: ""

jobs:
  # Job to generate the matrix of packages and systems
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: DeterminateSystems/nix-installer-action@v16
      - id: set-matrix
        env:
          NIXPKGS_ALLOW_UNFREE: 1
        run: |
          MATRIX=$(nix eval .#packages.x86_64-linux --json --impure | jq -c '
            keys | map({system: "x86_64-linux", package: .})
          ')
          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"

  build:
    needs: generate-matrix
    name: Build ${{ matrix.package }} (${{ matrix.system }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: DeterminateSystems/nix-installer-action@v16

      - name: Build package
        env:
          NIXPKGS_ALLOW_UNFREE: 1
        run: nix build .#packages.${{ matrix.system }}.${{ matrix.package }} --print-build-logs --impure

      - name: Push to R2
        if: github.event_name != 'workflow_call' && github.ref == 'refs/heads/main'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          NIX_SECRET_KEY: ${{ secrets.NIX_SECRET_KEY }}
        run: |
          # Sign paths so consumers can verify integrity
          echo "$NIX_SECRET_KEY" > ./secret-key
          nix store sign --key-file ./secret-key $(readlink -f result)
          rm -f ./secret-key

          # Copy to R2
          nix copy --to "s3://${{ secrets.R2_BUCKET }}?endpoint=${{ secrets.R2_ENDPOINT }}&region=auto" $(readlink -f result)
