name: Build Nix Packages

on:
  push:
    branches:
      - main
    paths:
      - "nix/packages/**"
      - "nix/_sources/**"
      - "nvfetcher.toml"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/build.yml"
      - ".github/excluded-packages.json"
  workflow_dispatch:
    inputs:
      repository:
        description: "External GitHub repo (empty = current repo)"
        type: string
        required: false
        default: ""
      ref:
        description: "Branch/tag/commit (for external repo)"
        type: string
        required: false
        default: ""
      package:
        description: "Package(s) — comma-separated, or 'ALL' for all"
        type: string
        required: false
        default: "ALL"
      force:
        description: "Force rebuild even if already cached"
        type: boolean
        required: false
        default: false
  workflow_call:
    inputs:
      repository:
        description: "Repo to checkout (empty = current repo)"
        type: string
        required: false
        default: ""
      ref:
        description: "Git ref to checkout"
        type: string
        required: false
        default: ""
      package:
        description: "Package(s) — comma-separated, or 'ALL' for all"
        type: string
        required: false
        default: "ALL"
      force:
        description: "Force rebuild even if already cached"
        type: boolean
        required: false
        default: false

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_packages: ${{ steps.set-matrix.outputs.has_packages }}
    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: ${{ github.event_name == 'push' && 0 || 1 }}

      # ────────────────────────────────────────────────────────────
      # 1. Read excluded packages from external file
      # ────────────────────────────────────────────────────────────
      - name: Read excluded packages
        id: excluded
        run: |
          EXCLUDED=$(cat .github/excluded-packages.json 2>/dev/null || echo '[]')
          echo "excluded=$EXCLUDED" >> "$GITHUB_OUTPUT"
          echo "Excluded packages: $EXCLUDED"

      # ────────────────────────────────────────────────────────────
      # 2. Detect which packages need building
      #    ─ push:   diff against previous commit (changed packages)
      #    ─ manual: use workflow_dispatch input
      #    ─ remote: use workflow_call input or ALL
      # ────────────────────────────────────────────────────────────
      - name: Detect packages to build
        id: detect
        env:
          INPUT_PACKAGE: ${{ inputs.package || 'ALL' }}
          EXCLUDED: ${{ steps.excluded.outputs.excluded }}
        run: |
          MODE="all"
          PACKAGES=""

          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            SHA="${{ github.sha }}"

            # Handle first push to a new branch (zero hash)
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "New branch — building ALL"
              echo "mode=all" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            CHANGED_FILES=$(git diff --name-only "$BEFORE" "$SHA" 2>/dev/null || git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
            echo "Changed files:"
            echo "$CHANGED_FILES"

            # Core infrastructure → build ALL
            if echo "$CHANGED_FILES" | grep -qE '^(flake\.(nix|lock)|\.github/workflows/build\.yml|\.github/excluded-packages\.json)$'; then
              echo "Core infra changed → building ALL"
            else
              # Extract changed package names from nix/packages/<name>.nix
              CHANGED_PKGS=$(
                echo "$CHANGED_FILES" \
                  | grep -oP '^nix/packages/\K[^.]+(?=\.nix$)' \
                  | sort -u \
                  || true
              )

              if [ -z "$CHANGED_PKGS" ]; then
                echo "No package files changed → skipping"
                echo "mode=skip" >> "$GITHUB_OUTPUT"
                exit 0
              fi

              # Filter out excluded packages
              FILTERED=""
              while IFS= read -r pkg; do
                [ -z "$pkg" ] && continue
                if echo "$EXCLUDED" | jq -e --arg p "$pkg" 'index($p) != null' > /dev/null 2>&1; then
                  echo "Excluding $pkg (in excluded-packages.json)"
                else
                  FILTERED="${FILTERED}${FILTERED:+,}${pkg}"
                fi
              done <<< "$CHANGED_PKGS"

              if [ -z "$FILTERED" ]; then
                echo "All changed packages are excluded → skipping"
                echo "mode=skip" >> "$GITHUB_OUTPUT"
                exit 0
              fi

              MODE="selected"
              PACKAGES="$FILTERED"
              echo "Changed packages: $PACKAGES"
            fi

          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "workflow_call" ]; then
            if [ "$INPUT_PACKAGE" != "ALL" ] && [ -n "$INPUT_PACKAGE" ]; then
              MODE="selected"
              PACKAGES="$INPUT_PACKAGE"
              echo "Selected packages: $PACKAGES"
            else
              echo "Building ALL packages"
            fi
          fi

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"

      # ────────────────────────────────────────────────────────────
      # 3. Install Nix — only needed for ALL mode (nix eval)
      #    Selected mode builds directly from detected filenames.
      # ────────────────────────────────────────────────────────────
      - uses: DeterminateSystems/nix-installer-action@v22
        if: steps.detect.outputs.mode == 'all'
      - uses: DeterminateSystems/magic-nix-cache-action@v9
        if: steps.detect.outputs.mode == 'all'

      # ────────────────────────────────────────────────────────────
      # 4. Generate build matrix
      # ────────────────────────────────────────────────────────────
      - name: Set build matrix
        id: set-matrix
        env:
          MODE: ${{ steps.detect.outputs.mode }}
          PACKAGES: ${{ steps.detect.outputs.packages }}
          INPUT_PACKAGE: ${{ inputs.package || 'ALL' }}
          EXCLUDED: ${{ steps.excluded.outputs.excluded }}
          NIXPKGS_ALLOW_UNFREE: 1
        run: |
          if [ "$MODE" = "skip" ]; then
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
            echo "matrix={}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── Selected mode: build matrix from detected filenames ──
          if [ "$MODE" = "selected" ] && [ -n "$PACKAGES" ]; then
            MATRIX=$(echo "$PACKAGES" | jq -Rc 'split(",") | map({system: "x86_64-linux", package: .})')
            echo "Selected packages: $PACKAGES"

          # ── ALL mode: evaluate all packages from the flake ──
          else
            NIX_OUTPUT=$(mktemp)

            # External flake — no exclusion filter
            if [ "${{ inputs.repository }}" != "" ] && [ "${{ inputs.repository }}" != "${{ github.repository }}" ]; then
              nix eval .#packages.x86_64-linux --json --impure > "$NIX_OUTPUT" || {
                echo "=== nix eval failed ==="
                exit 1
              }
              MATRIX=$(jq -c 'keys | map({system: "x86_64-linux", package: .})' < "$NIX_OUTPUT")

            # Local flake — apply EXCLUDED_PACKAGES
            else
              nix eval .#packages.x86_64-linux --json --impure > "$NIX_OUTPUT" || {
                echo "=== nix eval failed ==="
                exit 1
              }
              MATRIX=$(jq -c --argjson excluded "$EXCLUDED" '
                keys | map(select(. as $p | $excluded | index($p) | not)) | map({system: "x86_64-linux", package: .})
              ' < "$NIX_OUTPUT")
            fi

            rm -f "$NIX_OUTPUT"
          fi

          COUNT=$(echo "$MATRIX" | jq 'length')
          echo "Packages to build: $COUNT"
          echo "has_packages=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"

      - name: Debug matrix output
        if: ${{ ! cancelled() }}
        run: |
          echo "Mode: ${{ steps.detect.outputs.mode }}"
          echo "Packages: ${{ steps.detect.outputs.packages }}"
          echo "Matrix: ${{ steps.set-matrix.outputs.matrix }}"
          echo "Has packages: ${{ steps.set-matrix.outputs.has_packages }}"

  # ────────────────────────────────────────────────────────────────
  # 5. Build each package in the matrix
  # ────────────────────────────────────────────────────────────────
  build:
    needs: generate-matrix
    if: needs.generate-matrix.outputs.has_packages == 'true'
    name: Build ${{ matrix.package }} (${{ matrix.system }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}

      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v9

      - name: Build package
        env:
          NIXPKGS_ALLOW_UNFREE: 1
        run: |
          nix build .#packages.${{ matrix.system }}.${{ matrix.package }} --print-build-logs --impure --accept-flake-config

      - name: Show build size
        run: |
          STORE_PATH=$(readlink -f result)
          RAW_SIZE=$(nix path-info -Sh "$STORE_PATH" | awk '{print $2, $3}')
          CLOSURE_SIZE=$(nix path-info -Sh "$STORE_PATH" --recursive | tail -1 | awk '{print $2, $3}')
          echo "### Build size: ${{ matrix.package }} (${{ matrix.system }})" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Output path | $RAW_SIZE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Closure (total with deps) | $CLOSURE_SIZE |" >> "$GITHUB_STEP_SUMMARY"

      - name: Sign & copy to R2 cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          NIX_SECRET_KEY: ${{ secrets.NIX_SECRET_KEY }}
        run: |
          STORE_PATH=$(readlink -f result)

          # Sign — pass key via stdin to avoid writing to disk
          echo "$NIX_SECRET_KEY" | nix store sign --key-file /dev/stdin "$STORE_PATH" 2>/dev/null || {
            echo "$NIX_SECRET_KEY" > ./secret-key
            nix store sign --key-file ./secret-key "$STORE_PATH"
            rm -f ./secret-key
          }

          COPY_SIZE=$(nix path-info -Sh "$STORE_PATH" | awk '{print $2, $3}')
          CLOSURE_SIZE=$(nix path-info -Sh "$STORE_PATH" --recursive | tail -1 | awk '{print $2, $3}')

          nix copy --to "s3://${{ secrets.R2_BUCKET }}?endpoint=${{ secrets.R2_ENDPOINT }}&region=auto" "$STORE_PATH"

          echo "### R2 cache result: ${{ matrix.package }}" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | ${{ matrix.package }} (${{ matrix.system }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Output path size | $COPY_SIZE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Closure size | $CLOSURE_SIZE |" >> "$GITHUB_STEP_SUMMARY"
