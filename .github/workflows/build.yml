name: Build Nix Packages

env:
  EXCLUDED_PACKAGES: '["9router"]'

on:
  push:
    branches:
      - main
    paths:
      - "nix/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/build.yml"
  workflow_dispatch:
  workflow_call:
    inputs:
      repository:
        description: "Repo to checkout (empty = current repo)"
        type: string
        required: false
        default: ""
      ref:
        description: "Git ref to checkout"
        type: string
        required: false
        default: ""
      package:
        description: "Package(s) — comma-separated, or 'ALL' for all"
        type: string
        required: false
        default: "ALL"

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}

      - uses: DeterminateSystems/nix-installer-action@v22

      - id: set-matrix
        env:
          NIXPKGS_ALLOW_UNFREE: 1
          INPUT_PACKAGE: ${{ inputs.package }}
        run: |
          if [ "$INPUT_PACKAGE" != "ALL" ]; then
            MATRIX=$(echo "$INPUT_PACKAGE" | jq -Rc '
              split(",") | map(gsub("^\\s+|\\s+$"; "")) | map({system: "x86_64-linux", package: .})
            ')
          elif [ "${{ inputs.repository }}" != "" ] && [ "${{ inputs.repository }}" != "${{ github.repository }}" ]; then
            MATRIX=$(nix eval .#packages.x86_64-linux --json --impure | jq -c '
              keys | map({system: "x86_64-linux", package: .})
            ')
          else
            MATRIX=$(nix eval .#packages.x86_64-linux --json --impure | jq -c --argjson excluded "$EXCLUDED_PACKAGES" '
              keys | map(select(. as $p | $excluded | index($p) | not)) | map({system: "x86_64-linux", package: .})
            ')
          fi
          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"

  build:
    needs: generate-matrix
    name: Build ${{ matrix.package }} (${{ matrix.system }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}

      - uses: DeterminateSystems/nix-installer-action@v22

      - uses: ./.github/actions/build-and-cache
        with:
          system: ${{ matrix.system }}
          package: ${{ matrix.package }}
          r2_access_key_id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2_bucket: ${{ secrets.R2_BUCKET }}
          r2_endpoint: ${{ secrets.R2_ENDPOINT }}
          nix_secret_key: ${{ secrets.NIX_SECRET_KEY }}
