name: Nix Flake Check

on:
  push:
  workflow_dispatch:

jobs:
  flake-check:
    runs-on: ubuntu-latest
    env:
      NIXPKGS_ALLOW_UNFREE: 1
    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Clear installer summary
        run: |
          > "$GITHUB_STEP_SUMMARY"

      - name: Check all flakes
        run: |
          echo "## Nix Flake Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### flake check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          FAILED=0
          find . -name "flake.nix" -print0 | while IFS= read -r -d '' file; do
            dir=$(dirname "$file")
            echo "--- Checking flake in $dir ---"
            nix flake check "$dir" --impure --accept-flake-config 2>&1 || {
              echo "::warning::flake check failed in $dir"
              FAILED=$((FAILED + 1))
            }
          done

      - name: Eval all packages
        id: eval
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### nix eval — packages.x86_64-linux" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          EVAL_OUTPUT=$(nix eval .#packages.x86_64-linux --json --impure 2>/dev/null) || {
            EVAL_ERR=$(nix eval .#packages.x86_64-linux --json --impure 2>&1 >/dev/null)
            echo "::error::nix eval failed — check flake for eval errors"
            echo "$EVAL_ERR"
            echo "❌ **Eval FAILED**" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$EVAL_ERR" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

          PKG_COUNT=$(echo "$EVAL_OUTPUT" | jq 'length')
          PKG_NAMES=$(echo "$EVAL_OUTPUT" | jq -r 'keys | .[]')
          echo "✓ $PKG_COUNT packages evaluated successfully" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$PKG_NAMES" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          echo "count=$PKG_COUNT" >> "$GITHUB_OUTPUT"
          echo "Successfully evaluated $PKG_COUNT packages"
