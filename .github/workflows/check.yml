name: Nix Flake Check

on:
  push:
  workflow_dispatch:

jobs:
  flake-check:
    runs-on: ubuntu-latest
    env:
      NIXPKGS_ALLOW_UNFREE: 1
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Find and check flakes
        run: |
          find . -name "flake.nix" -print0 | while IFS= read -r -d $'\0' file; do
            dir=$(dirname "$file")
            echo "Checking flake in $dir"
            nix flake check "$dir" --impure
            
            echo "Deeply evaluating flake outputs in $dir"
            nix eval "$dir" --impure --apply 'outputs:
              let
                force = x: builtins.deepSeq x true;
                targets = {
                  packages = if outputs ? packages then force outputs.packages else true;
                  nixosConfigurations = if outputs ? nixosConfigurations then 
                    force (builtins.mapAttrs (n: v: v.config.system.build.toplevel) outputs.nixosConfigurations)
                    else true;
                  homeConfigurations = if outputs ? homeConfigurations then 
                    force (builtins.mapAttrs (n: v: v.activationPackage) outputs.homeConfigurations)
                    else true;
                  nixosModules = if outputs ? nixosModules then force outputs.nixosModules else true;
                  overlays = if outputs ? overlays then force outputs.overlays else true;
                  lib = if outputs ? lib then force outputs.lib else true;
                };
              in
              force targets
            '
          done
