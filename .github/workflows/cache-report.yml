name: Generate Cache Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Clear installer summary
        run: |
          > "$GITHUB_STEP_SUMMARY"

      - name: Collect & parse all narinfos
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3api list-objects \
            --bucket "${{ secrets.R2_BUCKET }}" \
            --endpoint "${{ secrets.R2_ENDPOINT }}" \
            --region auto \
            --output json \
          > /tmp/objects.json

          > /tmp/report-data.txt

          mkdir -p /tmp/narinfos
          aws s3 cp "s3://${{ secrets.R2_BUCKET }}/" /tmp/narinfos/ \
            --endpoint "${{ secrets.R2_ENDPOINT }}" \
            --region auto \
            --recursive \
            --exclude "*" \
            --include "*.narinfo" \
            --only-show-errors

          cd /tmp/narinfos
          for NARINFO in *.narinfo; do
            [ -f "$NARINFO" ] || continue
            KEY="$NARINFO"

            STORE_PATH=$(grep '^StorePath:' "$NARINFO" 2>/dev/null | sed 's/^StorePath: //')
            NAR_URL=$(grep '^URL:' "$NARINFO" 2>/dev/null | sed 's/^URL: //')
            SIG=$(grep '^Sig:' "$NARINFO" 2>/dev/null | sed 's/^Sig: //')
            HASH="${KEY%.narinfo}"

            # Get NAR file size from objects.json
            NAR_SIZE=0
            if [ -n "$NAR_URL" ]; then
              NAR_SIZE=$(jq -r --arg url "$NAR_URL" '
                [.Contents // [] | .[] | select(.Key == $url) | .Size] | if length > 0 then .[0] else "0" end
              ' /tmp/objects.json)
            fi

            if [ -n "$STORE_PATH" ]; then
              NAME=$(basename "$STORE_PATH")
              LASTMOD=$(jq -r --arg key "$KEY" '[.Contents // [] | .[] | select(.Key == $key) | .LastModified] | if length > 0 then .[0] else "" end' /tmp/objects.json)
              NARINFO_SIZE=$(jq -r --arg key "$KEY" '[.Contents // [] | .[] | select(.Key == $key) | .Size] | if length > 0 then .[0] else "0" end' /tmp/objects.json)

              echo "$KEY|$STORE_PATH|$NARINFO_SIZE|$NAR_SIZE|$LASTMOD|$HASH|$SIG|$NAME" >> /tmp/report-data.txt
            fi
          done

      - name: Generate step summary & in-repo markdown
        run: |
          PACKAGES=$(nix eval .#packages.x86_64-linux --json --impure 2>/dev/null | jq -r 'keys[]' || echo "")
          TOTAL_BYTES=$(jq '[.Contents // [] | .[].Size] | add // 0' /tmp/objects.json)

          # â”€â”€ Aggregate per-package stats â”€â”€
          > /tmp/pkg-stats.txt
          for PKG in $PACKAGES; do
            NAME=$(basename "$STORE_PATH")
            VERSIONS=$(grep -i "/${PKG}-" /tmp/report-data.txt | wc -l)
            LATEST=$(grep -i "/${PKG}-" /tmp/report-data.txt | sort -t'|' -k4,4rn | head -1)

            if [ -n "$LATEST" ]; then
              LATEST_SIZE=$(echo "$LATEST" | cut -d'|' -f4)
              LATEST_MOD=$(echo "$LATEST" | cut -d'|' -f5)
              LATEST_SIG=$(echo "$LATEST" | cut -d'|' -f7)
            else
              LATEST_SIZE=0
              LATEST_MOD="-"
              LATEST_SIG=""
            fi

            HUMANSIZE=$(numfmt --to=iec "${LATEST_SIZE:-0}" 2>/dev/null || echo "${LATEST_SIZE}B")
            SIG_STATUS="${LATEST_SIG:+yes}"
            SIG_STATUS="${SIG_STATUS:-no}"
            echo "$PKG|$VERSIONS|$HUMANSIZE|$LATEST_MOD|$SIG_STATUS" >> /tmp/pkg-stats.txt
          done

          # â”€â”€ Build step summary â”€â”€
          TOTAL_HUMAN=$(numfmt --to=iec "$TOTAL_BYTES" 2>/dev/null || echo "${TOTAL_BYTES}B")
          PKG_COUNT=$(echo "$PACKAGES" | wc -w)
          ALL_COUNT=$(wc -l < /tmp/report-data.txt)
          {
            echo "## R2 Cache Report"
            echo ""
            echo "**Generated:** $(date -u)"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Total objects | $(jq '[.Contents // []] | length' /tmp/objects.json) |"
            echo "| Total size | $TOTAL_HUMAN |"
            echo "| Flake packages | $PKG_COUNT |"
            echo "| Cached versions | $ALL_COUNT |"
          } >> "$GITHUB_STEP_SUMMARY"

          # â”€â”€ Build in-repo markdown (CACHE.md) â”€â”€
          {
            echo "# R2 Nix Cache Report"
            echo ""
            echo "*Auto-generated by [cache-report.yml](.github/workflows/cache-report.yml)*"
            echo ""
            echo "- Generated: $(date -u)"
            echo "- Total cache size: $TOTAL_HUMAN"
            echo "- Flake packages: $PKG_COUNT"
            echo "- Cached versions: $ALL_COUNT"
            echo ""
            echo "## Package Overview"
            echo ""
            echo "| Package | Versions | Latest Size | Last Modified | Signed |"
            echo "|---|---|---|---|---|"
            sort -t'|' -k1,1 /tmp/pkg-stats.txt | while IFS='|' read -r PKG VERSIONS SIZE LASTMOD SIG; do
              echo "| $PKG | $VERSIONS | $SIZE | $LASTMOD | $SIG |"
            done
            echo ""
            echo "## Detailed Entries"
            echo ""
            echo "| Package | Store Path | Size | Last Modified | Signed |"
            echo "|---|---|---|---|---|"
          } > /tmp/CACHE.md

          sort -t'|' -k1,1 -k4,4rn /tmp/report-data.txt | while IFS='|' read -r KEY STORE_PATH NARINFO_SIZE NAR_SIZE LASTMOD HASH SIG NAME; do
            # Extract package name more reliably from flake output
            PKG_NAME=""
            for PKG in $PACKAGES; do
              if echo "$STORE_PATH" | grep -qiE "/${PKG}-[0-9]"; then
                PKG_NAME="$PKG"
                break
              fi
            done
            if [ -z "$PKG_NAME" ]; then
              PKG_NAME=$(echo "$NAME" | sed 's/^[^-]*-//' | sed 's/-[0-9].*//')
            fi

            NAR_HUMAN=$(numfmt --to=iec "${NAR_SIZE:-0}" 2>/dev/null || echo "${NAR_SIZE}B")
            SIG_STATUS="${SIG:+yes}"
            SIG_STATUS="${SIG_STATUS:-no}"
            echo "| $PKG_NAME | \`$STORE_PATH\` | $NAR_HUMAN | $LASTMOD | $SIG_STATUS |" >> /tmp/CACHE.md

            # Also add to step summary
            {
              echo "| $PKG_NAME | \`$STORE_PATH\` | $NAR_HUMAN | $LASTMOD | $SIG_STATUS |"
            } >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          done

          # â”€â”€ Actions section in step summary â”€â”€
          {
            echo ""
            echo "### Actions"
            echo ""
            echo "| Package | Clean |"
            echo "|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          for PKG in $PACKAGES; do
            if [ "$PKG" = "9router" ]; then continue; fi
            echo "| $PKG | [Remove all â†’](https://github.com/aspiand/dotfiles/actions/workflows/gc.yml) |" >> "$GITHUB_STEP_SUMMARY"
          done

          # Copy in-repo markdown
          cp /tmp/CACHE.md /tmp/cache_report.md

      - name: Commit CACHE.md to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p docs
          cp /tmp/CACHE.md docs/cache-report.md

          git add docs/cache-report.md
          if git diff --cached --quiet; then
            echo "No changes to CACHE.md"
          else
            git commit -m "chore: update cache report [skip ci]"
            git push origin main
          fi

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: cache-report
          path: /tmp/cache_report.md
