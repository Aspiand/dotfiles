name: Build Nix package and cache to R2
description: Builds a Nix package, displays size, signs it, and copies to R2

inputs:
  system:
    description: "Nix system (e.g. x86_64-linux)"
    required: true
  package:
    description: "Package attribute name"
    required: true
  r2_access_key_id:
    description: "R2 access key ID"
    required: true
  r2_secret_access_key:
    description: "R2 secret access key"
    required: true
  r2_bucket:
    description: "R2 bucket name"
    required: true
  r2_endpoint:
    description: "R2 endpoint URL"
    required: true
  nix_secret_key:
    description: "Nix secret key for signing"
    required: true

runs:
  using: composite
  steps:
    - name: Build package
      shell: bash
      env:
        NIXPKGS_ALLOW_UNFREE: 1
      run: nix build .#packages.${{ inputs.system }}.${{ inputs.package }} --print-build-logs --impure

    - name: Show build size
      shell: bash
      run: |
        STORE_PATH=$(readlink -f result)
        RAW_SIZE=$(nix path-info -Sh "$STORE_PATH" | awk '{print $2}')
        CLOSURE_SIZE=$(nix path-info -Sh "$STORE_PATH" --recursive | tail -1 | awk '{print $2}')
        echo "### Build size: ${{ inputs.package }} (${{ inputs.system }})" >> "$GITHUB_STEP_SUMMARY"
        echo "| Metric | Size |" >> "$GITHUB_STEP_SUMMARY"
        echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
        echo "| Output path | $RAW_SIZE |" >> "$GITHUB_STEP_SUMMARY"
        echo "| Closure (total with deps) | $CLOSURE_SIZE |" >> "$GITHUB_STEP_SUMMARY"

    - name: Sign & copy to R2 cache
      shell: bash
      env:
        AWS_ACCESS_KEY_ID: ${{ inputs.r2_access_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.r2_secret_access_key }}
        NIX_SECRET_KEY: ${{ inputs.nix_secret_key }}
      run: |
        STORE_PATH=$(readlink -f result)

        echo "$NIX_SECRET_KEY" > ./secret-key
        nix store sign --key-file ./secret-key "$STORE_PATH"
        rm -f ./secret-key

        COPY_SIZE=$(nix path-info -Sh "$STORE_PATH" | awk '{print $2}')
        CLOSURE_SIZE=$(nix path-info -Sh "$STORE_PATH" --recursive | tail -1 | awk '{print $2}')

        nix copy --to "s3://${{ inputs.r2_bucket }}?endpoint=${{ inputs.r2_endpoint }}&region=auto" "$STORE_PATH"

        echo "### R2 cache result: ${{ inputs.package }}" >> "$GITHUB_STEP_SUMMARY"
        echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
        echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
        echo "| Package | ${{ inputs.package }} (${{ inputs.system }}) |" >> "$GITHUB_STEP_SUMMARY"
        echo "| Output path size | $COPY_SIZE |" >> "$GITHUB_STEP_SUMMARY"
        echo "| Closure size | $CLOSURE_SIZE |" >> "$GITHUB_STEP_SUMMARY"
        echo "| R2 bucket | ${{ inputs.r2_bucket }} |" >> "$GITHUB_STEP_SUMMARY"
